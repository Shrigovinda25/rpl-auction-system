<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Strategy Portal - RPL Auction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        cardBg: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="bg-darkBg text-blue-100 min-h-screen custom-scrollbar">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 glass border-b border-white/5 py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black italic shadow-lg shadow-blue-600/30">R</div>
            <h1 class="text-2xl font-black uppercase tracking-tighter text-white">Strategy <span class="text-blue-500">Portal</span></h1>
        </div>
        <div class="flex gap-4">
            <a href="tournament.html" class="text-xs font-black uppercase tracking-widest text-amber-500 hover:text-white transition hidden sm:inline"><i class="fas fa-trophy mr-1"></i> Tournament</a>
            <a href="admin.html" class="text-xs font-black uppercase tracking-widest text-gray-400 hover:text-white transition">Admin</a>
            <a href="auction.html" class="text-xs font-black uppercase tracking-widest text-gray-400 hover:text-white transition hidden md:inline">Live Auction</a>
        </div>
    </nav>

    <!-- Header & Filter -->
    <header class="max-w-7xl mx-auto px-6 py-12 text-center relative">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-64 h-64 bg-blue-600/10 blur-[100px] rounded-full"></div>
        <h2 class="text-4xl md:text-6xl font-black text-white uppercase tracking-tighter mb-4 relative z-10">Final <span class="bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">Squads</span></h2>
        <p class="text-gray-400 max-w-2xl mx-auto mb-10 font-medium">View the final squad compositions, player acquisitions, and sold prices from the RPL Auction.</p>
        
        <div class="max-w-xl mx-auto relative z-10 group">
            <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-blue-400 transition-colors"></i>
            <input type="text" id="player-search" placeholder="Search by name, sport, or role..." 
            class="w-full bg-black/40 border border-white/10 rounded-2xl py-5 pl-14 pr-6 focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500/50 transition-all font-medium text-white placeholder:text-gray-600 shadow-2xl">
        </div>
    </header>

    <main id="main-container" class="max-w-7xl mx-auto px-6 pb-24 space-y-20">
        <!-- Dynamic content injected here -->
    </main>

    <footer class="py-12 border-t border-white/5 text-center text-gray-600">
        <p class="text-xs font-black uppercase tracking-widest">RPL Auction 2026 • Strategy Portal</p>
    </footer>

    <!-- JS Logic -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script>
        let players = [];

        // Fetch and parse the CSV
        fetch('RPL Auction Result.csv')
            .then(response => response.text())
            .then(csvText => {
                Papa.parse(csvText, {
                    complete: function (results) {
                        const rows = results.data;
                        const playersData = [];
                        for (const row of rows) {
                            // Basic validation to skip headers, sections, and empty rows
                            if (row.length >= 7 && row[0] !== 'SECTION' && row[0] !== 'Player Name' && row[0] !== '' && !row[0].startsWith('Total') && !row[0].startsWith('Export') && !row[0].startsWith('OVERALL')) {
                                playersData.push({
                                    name: row[0],
                                    sport: row[1].split(';').map(s => s.trim()),
                                    gender: row[2],
                                    basePrice: row[3],
                                    soldPrice: row[4],
                                    team: row[5],
                                    status: row[6]
                                });
                            }
                        }
                        const predefinedCaptains = [
                            { name: "Akshay Sandur (Captain)", sport: ["Cricket"], gender: "Male", basePrice: "-", soldPrice: "Retained", team: "ROBO KNIGHTS", status: "Selected" },
                            { name: "Shashank Kurtakoti (Vice Captain)", sport: ["Cricket"], gender: "Male", basePrice: "-", soldPrice: "Retained", team: "ROBO KNIGHTS", status: "Selected" },
                            { name: "Priya Hunswadkar (Captain)", sport: ["Cricket", "Tug of War", "Volleyball", "Batminton"], gender: "Female", basePrice: "-", soldPrice: "Retained", team: "FLASHING BOTS 🤖", status: "Selected" },
                            { name: "Ayush Marigoudar (Vice Captain)", sport: ["Cricket", "Tug of War"], gender: "Male", basePrice: "-", soldPrice: "Retained", team: "FLASHING BOTS 🤖", status: "Selected" },
                            { name: "Aditya B (Captain)", sport: ["Cricket", "Volleyball", "Batminton"], gender: "Male", basePrice: "-", soldPrice: "Retained", team: "TECH TITANS 🤖", status: "Selected" },
                            { name: "Abhay Patil (Vice Captain)", sport: ["Cricket", "Volleyball", "Tug of War"], gender: "Male", basePrice: "-", soldPrice: "Retained", team: "TECH TITANS 🤖", status: "Selected" }
                        ];

                        players = [...predefinedCaptains, ...playersData];
                        render();
                    }
                });
            })
            .catch(err => {
                console.error("Failed to load CSV:", err);
                document.getElementById('main-container').innerHTML = '<div class="text-center text-red-500 font-bold py-12">Failed to load auction results data. Please ensure "RPL Auction Result.csv" exists.</div>';
            });

        // Search Logic
        const searchInput = document.getElementById('player-search');
        searchInput.addEventListener('input', render);

        function render() {
            const query = searchInput.value.toLowerCase();
            const filtered = players.filter(p => 
                p.name.toLowerCase().includes(query) || 
                p.sport.join(' ').toLowerCase().includes(query) ||
                p.team.toLowerCase().includes(query)
            );

            // Group by team
            const teamsMap = {};
            filtered.forEach(p => {
                if(p.status === 'Selected') {
                    if(!teamsMap[p.team]) teamsMap[p.team] = [];
                    teamsMap[p.team].push(p);
                }
            });

            // sort teams alphabetically
            const teams = Object.keys(teamsMap).sort();

            const container = document.getElementById('main-container');
            container.innerHTML = '';

            teams.forEach(team => {
                const teamPlayers = teamsMap[team];
                const males = teamPlayers.filter(p => p.gender === 'Male');
                const females = teamPlayers.filter(p => p.gender === 'Female');

                const totalSpend = teamPlayers.reduce((sum, p) => sum + (parseInt(p.soldPrice) || 0), 0);

                const sectionHTML = `
                <section class="space-y-8 bg-white/[0.02] p-8 rounded-3xl border border-white/10 mb-16 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-64 h-64 bg-blue-600/5 blur-[100px] rounded-full pointer-events-none"></div>
                    <div class="border-b border-white/10 pb-6 mb-8 flex flex-col md:flex-row gap-4 justify-between md:items-center">
                        <h2 class="text-3xl md:text-5xl font-black text-white uppercase tracking-tighter">${team}</h2>
                        <div class="flex gap-3 flex-wrap">
                            <span class="bg-indigo-500/20 text-indigo-300 border border-indigo-500/30 px-4 py-2 rounded-full text-sm font-bold shadow-lg flex items-center gap-2">
                                <i class="fas fa-users"></i> ${teamPlayers.length} ATHLETES
                            </span>
                            <span class="bg-green-500/20 text-green-300 border border-green-500/30 px-4 py-2 rounded-full text-sm font-bold shadow-lg flex items-center gap-2">
                                <i class="fas fa-coins"></i> ${totalSpend} RC TOTAL
                            </span>
                        </div>
                    </div>

                    ${renderGenderSection('Female', females, 'pink')}
                    ${renderGenderSection('Male', males, 'blue')}
                </section>
                `;
                container.insertAdjacentHTML('beforeend', sectionHTML);
            });
            
            if(teams.length === 0) {
               container.innerHTML = `<div class="text-center text-gray-500 font-bold py-12">NO RESULTS FOUND</div>`;
            }
        }

        function renderGenderSection(gender, genderPlayers, accent) {
            if(genderPlayers.length === 0) return '';
            
            // Sort by sold price (descending). 'Retained' players stay at top.
            genderPlayers.sort((a, b) => {
                const priceA = a.soldPrice === 'Retained' ? Infinity : (parseInt(a.soldPrice) || 0);
                const priceB = b.soldPrice === 'Retained' ? Infinity : (parseInt(b.soldPrice) || 0);
                return priceB - priceA;
            });

            const rows = genderPlayers.map(p => createRow(p, accent)).join('');
            
            return `
            <div class="space-y-4 mb-8">
                <div class="flex items-center gap-4 border-l-4 border-${accent}-500 pl-4 py-2">
                    <h3 class="text-xl font-black text-white uppercase tracking-wider">${gender} Squad</h3>
                    <span class="text-xs font-bold bg-${accent}-500/10 text-${accent}-400 px-3 py-1 rounded-full border border-${accent}-500/20">${genderPlayers.length} PLAYERS</span>
                </div>
                <div class="overflow-x-auto rounded-xl border border-white/5 shadow-xl bg-black/40">
                    <table class="w-full text-left border-collapse min-w-[800px]">
                        <thead class="bg-white/5">
                            <tr>
                                <th class="px-6 py-4 text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 w-1/4">Athlete Profile</th>
                                <th class="px-6 py-4 text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 text-center w-1/3">Disciplines</th>
                                <th class="px-6 py-4 text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 text-center w-1/6">Base Price</th>
                                <th class="px-6 py-4 text-[10px] font-black uppercase tracking-[0.2em] text-green-500 text-center w-1/6">Sold Price</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-white/5">
                            ${rows}
                        </tbody>
                    </table>
                </div>
            </div>
            `;
        }

        function createRow(p, accent) {
            const avatar = `<div class="w-10 h-10 rounded-full bg-${accent}-500/20 border border-${accent}-500/20 flex items-center justify-center font-black text-${accent}-400 text-xs shadow-inner flex-shrink-0">${p.name.charAt(0).toUpperCase()}</div>`;
            
            const sports = p.sport.map(s => `<span class="px-2 py-0.5 rounded text-[10px] font-bold bg-white/5 text-gray-300 border border-white/10 uppercase tracking-tighter whitespace-nowrap">${s}</span>`).join('');

            const isRetained = p.soldPrice === 'Retained';
            const basePriceDisplay = p.basePrice === '-' ? '<span class="opacity-50">-</span>' : `${p.basePrice} <span class="text-blue-500/60 text-[10px]">RC</span>`;
            const soldPriceDisplay = isRetained ? `<span class="text-yellow-400 font-bold uppercase tracking-widest text-xs">${p.soldPrice}</span>` : `${p.soldPrice} <span class="text-green-500/60 text-[10px]">RC</span>`;

            return `
                <tr class="hover:bg-white/[0.04] transition-colors group">
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-4">
                            ${avatar}
                            <div class="font-black ${isRetained ? 'text-yellow-100' : 'text-white'} text-sm uppercase tracking-tighter truncate" title="${p.name}">${p.name}</div>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex flex-wrap justify-center gap-1.5 max-w-sm mx-auto">
                            ${sports}
                        </div>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <div class="font-mono text-sm font-bold text-gray-400">${basePriceDisplay}</div>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <div class="font-mono text-sm font-black text-green-400">${soldPriceDisplay}</div>
                    </td>
                </tr>
            `;
        }
    </script>
</body>

</html>
